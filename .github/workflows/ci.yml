name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure npm for resilient installs
        run: |
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-timeout 600000

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            echo "::group::npm ci (attempt $attempt)"
            if npm ci --prefer-offline --no-audit --no-fund; then
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            echo "npm ci failed (attempt $attempt). Cleaning and retrying..."
            rm -rf node_modules
            sleep 10
          done
          echo "npm ci failed after 3 attempts" >&2
          exit 1

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: |
          for attempt in 1 2 3; do
            if npx playwright install --with-deps chromium; then
              exit 0
            fi
            echo "playwright install failed (attempt $attempt). Retrying..."
            sleep 10
          done
          exit 1

      - name: Run role-matrix E2E
        env:
          E2E_TEST_MODE: "1"
          PLAYWRIGHT_SKIP_BUILD: "1"
        run: npm run test:e2e
