name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run role-matrix E2E
        env:
          E2E_TEST_MODE: "1"
          PLAYWRIGHT_SKIP_BUILD: "1"
        run: npm run test:e2e
