steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - "-f"
      - "packages/renderer-server/Dockerfile"
      - "-t"
      - "us-central1-docker.pkg.dev/$PROJECT_ID/le-relief/renderer-server:latest"
      - "."
images:
  - "us-central1-docker.pkg.dev/$PROJECT_ID/le-relief/renderer-server:latest"
options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY
timeout: 1800s
